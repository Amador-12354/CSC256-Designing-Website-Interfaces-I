     <script>
        // This is a Javascript single-line comment 
        /* This is a JavaScript multi-line comment 
            The goal in this class is to comment nearly every line in JavaScript code
            JavaScript is a scripting language - it exists to make webpages more interactive
            JavaScript is a dynamically typed language - Will guess the type of variables being used
            JavaScript uses the Document Object Mode (DOM) to interact with the HTML page
            JavaScript and Java are entirely different languages that happen to be named similarly
        */

        /* 4 key foundation components of programming/scripting 
            1) Variables
            2) Functions
            3) if/also (decision) logic 
            4) loops 
        */
            
        // 1) Variables - piece of code that allows one to store a value
            // Example is "right" way to set up a variable in JavaScript
            // let is a JavaScript keyword that allows one to create a variable
            //then create a meaningful variable name
            // the single = sign is assignment - code on left side of sign will take value of code on the right side
        let myName = "Amador";

        // Var is another way to create variable in JavaScript
        // myname and myName are 2 diff variables because JavaScript is case=sensitive
        var myname = "Leon";

        // There are different styles of variable names - for examples, camelCase, - 1st word starts with lowercase letter and other works start with a captial letter (myPetsNameIs)
        // snake_case - separates each word with an _

        // This is technically valid way to set up a variable in JavaScript (PLEASE USE KEYWORD let WHEN CREATING A VARIABLE)
        my_name = "Amador";

        // If there is a variable where the value should not change use the keyword const; use UPPERCASE for name of a constant variable to give other developers the context that the value does not change
        const PI = 3.14;

        // 2) Functions - Are a way to organize code and allow one to easily reuse code (AWESOME)

            // There are 4 ways to use/write functions
            // When setting up function use function keyword -> use a descriptive name for function - maybe incorporate a verb -> open and close parenthesis () -> open and close curly braces {}

            function showGreeting() {
                console.log("Hi guys");
            }
            
            // Call function to print - use function name + ()
            showGreeting();
     </script>
